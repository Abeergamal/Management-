<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="قطع الغيار"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>قطع الغيار — نظام إدارة الأعمال</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh;overscroll-behavior:none;}
input,select,textarea,button{font-family:'Cairo',sans-serif;direction:rtl;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0f172a;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;}
header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);border-bottom:1px solid #1e293b;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto;}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;}
.app-title{font-weight:800;font-size:18px;color:#e2e8f0;}
.app-sub{font-size:11px;color:#64748b;}
.header-stats{margin-right:auto;display:flex;gap:20px;}
.hstat-val{font-weight:700;font-size:16px;}
.hstat-lbl{font-size:10px;color:#64748b;text-align:center;}

nav{background:#0d1526;border-bottom:1px solid #1e293b;display:flex;gap:2px;padding:6px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.nav-btn{background:transparent;border:none;color:#64748b;padding:7px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;white-space:nowrap;}
.nav-btn.active{background:rgba(99,102,241,.15);color:#818cf8;font-weight:700;}

main{max-width:1200px;margin:0 auto;padding:20px 14px 80px;width:100%;}

/* Cards & Grid */
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:14px;position:relative;}
.card-value{font-size:18px;font-weight:800;color:#e2e8f0;margin-bottom:3px;}
.card-label{font-size:11px;color:#64748b;}
.section-title{font-size:18px;font-weight:800;color:#e2e8f0;margin-bottom:16px;border-right:3px solid #6366f1;padding-right:10px;}
.section-title.mt{margin-top:28px;}

/* Form */
.form-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px;margin-bottom:20px;}
.form-card-title{font-weight:700;font-size:15px;color:#818cf8;margin-bottom:14px;border-bottom:1px solid #1e293b;padding-bottom:9px;}
.form-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.field-group{flex:1 1 170px;display:flex;flex-direction:column;gap:3px;}
label.lbl{font-size:11px;color:#94a3b8;font-weight:600;}
input.inp,select.sel,textarea.ta{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 11px;color:#e2e8f0;font-size:13px;width:100%;outline:none;}
textarea.ta{resize:vertical;min-height:75px;}
input.inp:focus,select.sel:focus,textarea.ta:focus{border-color:#6366f1;}
.btn{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;}
.btn.sm{padding:5px 11px;font-size:11px;margin-top:0;}
.btn.danger{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn.outline{background:transparent;border:1px solid #334155;color:#94a3b8;}
.del-btn{position:absolute;top:9px;left:9px;background:rgba(239,68,68,.15);border:none;color:#f87171;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.del-btn2{background:rgba(239,68,68,.1);border:none;color:#f87171;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:11px;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;border:none;cursor:pointer;}

/* Table */
.tbl-wrap{overflow-x:auto;margin-top:14px;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;background:#0f172a;border-radius:12px;overflow:hidden;font-size:12px;}
th{background:#1e293b;padding:9px 11px;text-align:right;color:#94a3b8;font-weight:700;font-size:11px;border-bottom:1px solid #334155;}
td{padding:9px 11px;border-bottom:1px solid #1e293b;color:#cbd5e1;vertical-align:middle;}
tr:nth-child(even) td{background:rgba(255,255,255,.02);}

/* Partner */
.partner-avatar{width:42px;height:42px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;margin:0 auto 9px;}
.partner-name{text-align:center;font-weight:700;font-size:15px;margin-bottom:10px;color:#e2e8f0;}
.row-data{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.row-data .lv{color:#94a3b8;}
.row-data .rv{color:#e2e8f0;}
.row-data .rv.green{color:#4ade80;font-weight:700;}
.row-data .rv.red{color:#f87171;font-weight:700;}
.row-data .rv.accent{color:#818cf8;font-weight:700;}

/* PL Row */
.pl-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e293b;font-size:13px;}
.pl-row.bold .pl-lbl,.pl-row.bold .pl-val{font-weight:700;}
.pl-row.large .pl-lbl,.pl-row.large .pl-val{font-size:15px;}
.pl-lbl{color:#94a3b8;}

/* Progress bar */
.progress-wrap{margin-top:9px;background:#1e293b;border-radius:99px;height:6px;overflow:hidden;}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#4ade80);transition:width .4s;}

/* Alert box */
.alert-box{border:1px solid;border-radius:10px;padding:9px 14px;flex:1;min-width:190px;}

/* Overlay / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px;}
.modal-box{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:20px;width:100%;max-width:420px;}
.modal-box.wide{max-width:700px;max-height:88vh;overflow-y:auto;}
.modal-title{font-weight:800;font-size:17px;color:#818cf8;margin-bottom:18px;}

/* Item grid for order form */
.item-grid{display:grid;grid-template-columns:1fr 75px 105px 1fr 30px;gap:7px;align-items:center;margin-bottom:7px;}
.item-grid-hdr{display:grid;grid-template-columns:1fr 75px 105px 1fr 30px;gap:7px;margin-bottom:5px;}
.ig-hdr{font-size:10px;color:#64748b;font-weight:700;}

/* Stock summary chips */
.stock-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.chip{background:#0a0f1e;border:1px solid #1e293b;border-radius:8px;padding:7px 12px;text-align:center;min-width:75px;}
.chip-val{font-weight:800;font-size:14px;}
.chip-lbl{font-size:10px;color:#64748b;margin-top:1px;}

/* Empty */
.empty{text-align:center;color:#475569;padding:28px 0;font-size:13px;}

/* Summary row in sales */
.sale-summary{display:flex;gap:20px;margin-bottom:10px;padding:9px 12px;background:#0a0f1e;border-radius:8px;flex-wrap:wrap;}

@media(max-width:600px){
.grid4{grid-template-columns:repeat(2,1fr);}
.grid3{grid-template-columns:1fr;}
.item-grid,.item-grid-hdr{grid-template-columns:1fr 60px 90px 0 30px;}
.item-grid .notes-cell{display:none;}
}
</style>

</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "autoparts_v2";
const init = { partners:[], orders:[], sales:[], expenses:[], withdrawals:[], partnerDeposits:[], dailyNotes:[] };

const load = () => { try { const r=localStorage.getItem(STORAGE_KEY); return r?{...init,...JSON.parse(r)}:{...init}; } catch { return {...init}; }};
const save = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e){} };

const fmt = (n) => Number(n||0).toLocaleString("ar-EG",{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now() + Math.random();

const TABS = [
  {id:"dashboard",label:"الرئيسية",icon:"◈"},
  {id:"partners",label:"الشركاء",icon:"⬡"},
  {id:"orders",label:"الأوردرات",icon:"◻"},
  {id:"sales",label:"المبيعات",icon:"◈"},
  {id:"expenses",label:"المصاريف",icon:"◆"},
  {id:"daily",label:"اليوميات",icon:"◇"},
  {id:"reports",label:"التقارير",icon:"▣"},
];

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(load);
  const [tab, setTab] = useState("dashboard");
  const [modal, setModal] = useState(null);

  useEffect(() => save(data), [data]);

  const addItem = (key,item) => setData(d=>({...d,[key]:[...d[key],{id:uid(),...item}]}));
  const removeItem = (key,id) => setData(d=>({...d,[key]:d[key].filter(i=>i.id!==id)}));
  const updateItem = (key,id,patch) => setData(d=>({...d,[key]:d[key].map(i=>i.id===id?{...i,...patch}:i)}));

  // ── Calcs ──
  const totalCapital = data.partners.reduce((s,p)=>s+Number(p.capital||0),0);
  const totalDeposits = data.partnerDeposits.reduce((s,d)=>s+Number(d.amount||0),0);
  const totalInvested = totalCapital + totalDeposits;

  const orderSalesFlat = data.orders.flatMap(o=>(o.items||[]).flatMap(it=>(it.salesLog||[]).map(sl=>({...sl,cost:it.unitCost*sl.qty}))));
  const allSales = [...data.sales,...orderSalesFlat];
  const totalSalesRevenue = allSales.reduce((s,x)=>s+Number(x.total||0),0);
  const totalSalesCost = allSales.reduce((s,x)=>s+Number(x.cost||0),0);
  const totalExpenses = data.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalWithdrawals = data.withdrawals.reduce((s,w)=>s+Number(w.amount||0),0);
  const grossProfit = totalSalesRevenue - totalSalesCost;
  const netProfit = grossProfit - totalExpenses;
  const availableProfit = netProfit - totalWithdrawals;

  const creditSales = allSales.filter(s=>s.type==="credit");
  const pendingCredit = creditSales.reduce((s,x)=>s+(x.collected?0:Number(x.total||0)),0);

  const partnerShares = data.partners.map(p=>{
    const deps = data.partnerDeposits.filter(d=>d.partnerId===p.id).reduce((s,d)=>s+Number(d.amount||0),0);
    const totalContrib = Number(p.capital||0)+deps;
    const share = totalInvested>0?(totalContrib/totalInvested)*100:0;
    const pWith = data.withdrawals.filter(w=>w.partnerId===p.id).reduce((s,w)=>s+Number(w.amount||0),0);
    const profitShare = (availableProfit*share)/100;
    return {...p,totalContrib,share,profitShare,partnerWithdrawals:pWith};
  });

  const totals = {totalSalesRevenue,totalSalesCost,grossProfit,netProfit,totalExpenses,totalWithdrawals,pendingCredit,availableProfit,totalInvested};

  return (
    <div id="app-inner">
      <header>
        <div className="header-inner">
          <div className="logo-mark">⬡</div>
          <div>
            <div className="app-title">قطع الغيار</div>
            <div className="app-sub">نظام إدارة الأعمال</div>
          </div>
          <div className="header-stats">
            <div><div className="hstat-val" style={{color:netProfit>=0?"#4ade80":"#f87171"}}>{fmt(netProfit)}</div><div className="hstat-lbl">صافي الربح ج.م</div></div>
            <div><div className="hstat-val" style={{color:"#60a5fa"}}>{fmt(totalSalesRevenue)}</div><div className="hstat-lbl">المبيعات ج.م</div></div>
          </div>
        </div>
      </header>

      <nav>
        {TABS.map(t=>(
          <button key={t.id} className={`nav-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </nav>

      <main>
        {tab==="dashboard" && <Dashboard fmt={fmt} partnerShares={partnerShares} totals={totals}/>}
        {tab==="partners"  && <Partners data={data} addItem={addItem} removeItem={removeItem} partnerShares={partnerShares} fmt={fmt} setModal={setModal}/>}
        {tab==="orders"    && <Orders data={data} addItem={addItem} removeItem={removeItem} updateItem={updateItem} fmt={fmt}/>}
        {tab==="sales"     && <Sales data={data} addItem={addItem} removeItem={removeItem} updateItem={updateItem} fmt={fmt}/>}
        {tab==="expenses"  && <Expenses data={data} addItem={addItem} removeItem={removeItem} fmt={fmt} setModal={setModal}/>}
        {tab==="daily"     && <Daily data={data} addItem={addItem} removeItem={removeItem}/>}
        {tab==="reports"   && <Reports data={data} fmt={fmt} partnerShares={partnerShares} totals={totals} creditSales={creditSales}/>}
      </main>

      {modal && <PartnerModal modal={modal} setModal={setModal} addItem={addItem}/>}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({fmt,partnerShares,totals:{totalInvested,totalSalesRevenue,grossProfit,netProfit,totalExpenses,totalWithdrawals,pendingCredit,availableProfit}}) {
  const cards=[
    {label:"رأس المال",value:fmt(totalInvested),color:"#818cf8"},
    {label:"المبيعات",value:fmt(totalSalesRevenue),color:"#60a5fa"},
    {label:"مجمل الربح",value:fmt(grossProfit),color:"#34d399"},
    {label:"صافي الربح",value:fmt(netProfit),color:netProfit>=0?"#4ade80":"#f87171"},
    {label:"المصاريف",value:fmt(totalExpenses),color:"#fb923c"},
    {label:"السحوبات",value:fmt(totalWithdrawals),color:"#f472b6"},
    {label:"آجل متبقي",value:fmt(pendingCredit),color:"#fbbf24"},
    {label:"الربح المتاح",value:fmt(availableProfit),color:"#a78bfa"},
  ];
  return (
    <div>
      <div className="section-title">لوحة القيادة</div>
      <div className="grid4">
        {cards.map(c=>(
          <div key={c.label} className="card" style={{borderTop:`3px solid ${c.color}`}}>
            <div className="card-value" style={{color:c.color}}>{c.value}</div>
            <div className="card-label">{c.label} ج.م</div>
          </div>
        ))}
      </div>
      {partnerShares.length>0&&(
        <>
          <div className="section-title mt">نصيب الشركاء</div>
          <div className="grid3">
            {partnerShares.map(p=>(
              <div key={p.id} className="card" style={{borderTop:"3px solid #818cf8"}}>
                <div className="partner-avatar">{p.name[0]}</div>
                <div className="partner-name">{p.name}</div>
                <div style={{color:"#818cf8",fontWeight:700,textAlign:"center",fontSize:17}}>{p.share.toFixed(1)}%</div>
                <div className="card-label" style={{textAlign:"center",marginBottom:6}}>نسبة المشاركة</div>
                <div style={{color:"#4ade80",fontWeight:700,textAlign:"center"}}>{fmt(p.profitShare)} ج.م</div>
                <div className="card-label" style={{textAlign:"center"}}>نصيب الأرباح</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── Partners ──────────────────────────────────────────────────────────────────
function Partners({data,addItem,removeItem,partnerShares,fmt,setModal}) {
  const [f,setF]=useState({name:"",capital:"",phone:""});
  return (
    <div>
      <div className="section-title">إدارة الشركاء</div>
      <div className="form-card">
        <div className="form-card-title">إضافة شريك جديد</div>
        <div className="form-row">
          <Inp label="اسم الشريك" value={f.name} onChange={v=>setF({...f,name:v})}/>
          <Inp label="رأس المال (ج.م)" type="number" value={f.capital} onChange={v=>setF({...f,capital:v})}/>
          <Inp label="رقم الهاتف" value={f.phone} onChange={v=>setF({...f,phone:v})}/>
        </div>
        <button className="btn" onClick={()=>{ if(!f.name||!f.capital)return; addItem("partners",{...f,joinDate:today()}); setF({name:"",capital:"",phone:""}); }}>إضافة الشريك</button>
      </div>
      <div className="grid3">
        {partnerShares.map(p=>(
          <div key={p.id} className="card">
            <button className="del-btn" onClick={()=>removeItem("partners",p.id)}>✕</button>
            <div className="partner-avatar">{p.name[0]}</div>
            <div className="partner-name">{p.name}</div>
            {p.phone&&<div style={{color:"#64748b",fontSize:12,textAlign:"center",marginBottom:8}}>{p.phone}</div>}
            <DRow label="رأس المال" val={fmt(p.capital)+" ج.م"}/>
            <DRow label="إضافات" val={fmt(p.totalContrib-p.capital)+" ج.م"}/>
            <DRow label="الإجمالي" val={fmt(p.totalContrib)+" ج.م"} accent/>
            <DRow label="نسبة" val={p.share.toFixed(2)+"%"}/>
            <DRow label="نصيب الربح" val={fmt(p.profitShare)+" ج.م"} green/>
            <DRow label="سحوبات" val={fmt(p.partnerWithdrawals)+" ج.م"} red/>
            <div style={{marginTop:10,display:"flex",gap:7}}>
              <button className="btn sm" onClick={()=>setModal({type:"deposit",partnerId:p.id,partnerName:p.name})}>+ إضافة أموال</button>
              <button className="btn sm danger" onClick={()=>setModal({type:"withdraw",partnerId:p.id,partnerName:p.name})}>سحب</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Orders ────────────────────────────────────────────────────────────────────
function Orders({data,addItem,removeItem,updateItem,fmt}) {
  const emptyO={name:"",supplier:"",date:today(),notes:""};
  const emptyR={itemName:"",qty:"",unitCost:"",notes:"",_k:uid()};
  const [oForm,setOForm]=useState(emptyO);
  const [rows,setRows]=useState([{...emptyR,_k:uid()}]);
  const [expanded,setExpanded]=useState(null);
  const [selItem,setSelItem]=useState(null);

  const addRow=()=>setRows(r=>[...r,{...emptyR,_k:uid()}]);
  const delRow=k=>setRows(r=>r.filter(x=>x._k!==k));
  const updRow=(k,f,v)=>setRows(r=>r.map(x=>x._k===k?{...x,[f]:v}:x));

  const saveOrder=()=>{
    if(!oForm.name)return;
    const items=rows.filter(r=>r.itemName&&r.qty).map(r=>({
      id:uid(),itemName:r.itemName,qty:Number(r.qty),remaining:Number(r.qty),
      unitCost:Number(r.unitCost||0),notes:r.notes,salesLog:[],
    }));
    if(!items.length)return;
    const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
    addItem("orders",{...oForm,items,totalCost});
    setOForm(emptyO);
    setRows([{...emptyR,_k:uid()}]);
  };

  const allItems=data.orders.flatMap(o=>(o.items||[]).map(it=>({...it,orderName:o.name,orderId:o.id})));
  const lowStock=allItems.filter(it=>it.remaining>0&&it.remaining<=it.qty*0.2);
  const outOfStock=allItems.filter(it=>it.remaining===0);

  return (
    <div>
      <div className="section-title">الأوردرات والمخزن</div>

      {(lowStock.length>0||outOfStock.length>0)&&(
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          {outOfStock.length>0&&(
            <div className="alert-box" style={{borderColor:"#ef4444",background:"rgba(239,68,68,.08)"}}>
              <span style={{color:"#f87171",fontWeight:700}}>⚠ نفد المخزن ({outOfStock.length} صنف)</span>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{outOfStock.map(i=>i.itemName).join(" · ")}</div>
            </div>
          )}
          {lowStock.length>0&&(
            <div className="alert-box" style={{borderColor:"#f59e0b",background:"rgba(245,158,11,.08)"}}>
              <span style={{color:"#fbbf24",fontWeight:700}}>⚡ مخزن منخفض ({lowStock.length} صنف)</span>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{lowStock.map(i=>`${i.itemName}(${i.remaining})`).join(" · ")}</div>
            </div>
          )}
        </div>
      )}

      <div className="form-card">
        <div className="form-card-title">تسجيل أوردر جديد</div>
        <div className="form-row">
          <Inp label="اسم/رقم الأوردر" value={oForm.name} onChange={v=>setOForm({...oForm,name:v})}/>
          <Inp label="المورد" value={oForm.supplier} onChange={v=>setOForm({...oForm,supplier:v})}/>
          <Inp label="التاريخ" type="date" value={oForm.date} onChange={v=>setOForm({...oForm,date:v})}/>
          <Inp label="ملاحظات" value={oForm.notes} onChange={v=>setOForm({...oForm,notes:v})}/>
        </div>
        <div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
            <span style={{color:"#818cf8",fontWeight:700,fontSize:13}}>أصناف الأوردر</span>
            <button className="btn sm" onClick={addRow}>+ صنف</button>
          </div>
          <div className="item-grid-hdr">
            {["اسم الصنف","الكمية","تكلفة الوحدة","ملاحظات",""].map(h=><div key={h} className="ig-hdr">{h}</div>)}
          </div>
          {rows.map(row=>(
            <div key={row._k} className="item-grid">
              <input className="inp" placeholder="فلتر زيت تويوتا..." value={row.itemName} onChange={e=>updRow(row._k,"itemName",e.target.value)}/>
              <input className="inp" type="number" placeholder="0" value={row.qty} onChange={e=>updRow(row._k,"qty",e.target.value)}/>
              <input className="inp" type="number" placeholder="0.00" value={row.unitCost} onChange={e=>updRow(row._k,"unitCost",e.target.value)}/>
              <input className="inp notes-cell" placeholder="اختياري" value={row.notes} onChange={e=>updRow(row._k,"notes",e.target.value)}/>
              <button className="del-btn2" onClick={()=>delRow(row._k)}>✕</button>
            </div>
          ))}
          {rows.some(r=>r.qty&&r.unitCost)&&(
            <div style={{color:"#4ade80",fontSize:12,fontWeight:700,marginTop:7}}>
              إجمالي تكلفة الأوردر: {fmt(rows.reduce((s,r)=>s+Number(r.qty||0)*Number(r.unitCost||0),0))} ج.م
            </div>
          )}
        </div>
        <button className="btn" style={{marginTop:12}} onClick={saveOrder}>حفظ الأوردر</button>
      </div>

      {data.orders.length===0&&<div className="empty">لا يوجد أوردرات مسجلة</div>}
      {data.orders.map(order=>{
        const items=order.items||[];
        const totalQty=items.reduce((s,i)=>s+i.qty,0);
        const totalRem=items.reduce((s,i)=>s+i.remaining,0);
        const sold=totalQty-totalRem;
        const prog=totalQty>0?(sold/totalQty)*100:0;
        const isOpen=expanded===order.id;
        return (
          <div key={order.id} className="card" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:15,color:"#e2e8f0"}}>{order.name}</span>
                  {order.supplier&&<span style={{color:"#64748b",fontSize:12}}>· {order.supplier}</span>}
                  <span style={{color:"#64748b",fontSize:11}}>{order.date}</span>
                </div>
                <div style={{display:"flex",gap:14,marginTop:7,flexWrap:"wrap"}}>
                  <span style={{color:"#60a5fa",fontSize:12}}>تكلفة: {fmt(order.totalCost)} ج.م</span>
                  <span style={{color:"#94a3b8",fontSize:12}}>{items.length} صنف · {totalQty} قطعة</span>
                  <span style={{color:"#4ade80",fontSize:12}}>باقي: {totalRem}</span>
                  <span style={{color:"#fb923c",fontSize:12}}>مباع: {sold}</span>
                </div>
                <div className="progress-wrap"><div className="progress-bar" style={{width:prog+"%"}}/></div>
                <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{prog.toFixed(0)}% مباع</div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button className="btn sm outline" onClick={()=>setExpanded(isOpen?null:order.id)}>{isOpen?"▲ إخفاء":"▼ تفاصيل"}</button>
                <button className="del-btn2" onClick={()=>removeItem("orders",order.id)}>✕</button>
              </div>
            </div>

            {isOpen&&(
              <div style={{marginTop:14,borderTop:"1px solid #1e293b",paddingTop:14}}>
                <div style={{fontWeight:700,color:"#818cf8",marginBottom:10,fontSize:13}}>أصناف الأوردر</div>
                {items.map(item=>{
                  const rev=(item.salesLog||[]).reduce((s,sl)=>s+Number(sl.total||0),0);
                  const col=(item.salesLog||[]).filter(sl=>sl.collected!==false).reduce((s,sl)=>s+Number(sl.total||0),0);
                  const pend=rev-col;
                  const ip=item.qty>0?((item.qty-item.remaining)/item.qty)*100:0;
                  return (
                    <div key={item.id} style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:10,padding:12,marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:7}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,color:"#e2e8f0",fontSize:14}}>{item.itemName}</div>
                          <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:"#94a3b8"}}>كمية: <b style={{color:"#e2e8f0"}}>{item.qty}</b></span>
                            <span style={{fontSize:11,color:"#94a3b8"}}>متبقي: <b style={{color:item.remaining===0?"#f87171":item.remaining<=item.qty*0.2?"#fbbf24":"#4ade80"}}>{item.remaining}</b></span>
                            <span style={{fontSize:11,color:"#94a3b8"}}>مباع: <b style={{color:"#60a5fa"}}>{item.qty-item.remaining}</b></span>
                            <span style={{fontSize:11,color:"#94a3b8"}}>تكلفة: <b style={{color:"#e2e8f0"}}>{fmt(item.unitCost)} ج.م</b></span>
                            {rev>0&&<span style={{fontSize:11,color:"#4ade80"}}>إيراد: {fmt(rev)} ج.م</span>}
                            {pend>0&&<span style={{fontSize:11,color:"#fbbf24"}}>آجل: {fmt(pend)} ج.م</span>}
                          </div>
                          <div className="progress-wrap" style={{height:4,marginTop:6}}><div style={{height:"100%",borderRadius:99,background:ip===100?"#f87171":"#6366f1",width:ip+"%"}}/></div>
                        </div>
                        <button className="badge" style={{background:"#1e3a5f",fontSize:11}} onClick={()=>setSelItem({item,orderId:order.id,orderName:order.name})}>
                          📋 سجل البيع ({(item.salesLog||[]).length})
                        </button>
                      </div>
                      {(item.salesLog||[]).length>0&&(
                        <div style={{marginTop:9}}>
                          <div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:5}}>آخر المبيعات</div>
                          {[...(item.salesLog||[])].reverse().slice(0,4).map((sl,i)=>(
                            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 50px 70px 70px 60px 75px",gap:4,fontSize:11,color:"#cbd5e1",padding:"3px 0",borderBottom:"1px solid #1e293b"}}>
                              <div>{sl.customer||"—"}</div>
                              <div>{sl.qty}</div>
                              <div>{fmt(sl.price)}</div>
                              <div style={{color:"#4ade80",fontWeight:700}}>{fmt(sl.total)}</div>
                              <div><span className="badge" style={{fontSize:9,background:sl.type==="credit"?(sl.collected?"#166534":"#7c2d12"):"#1e3a5f"}}>{sl.type==="cash"?"كاش":sl.type==="wholesale"?"جملة":sl.collected?"✓ محصل":"⏳ آجل"}</span></div>
                              <div style={{color:"#64748b"}}>{sl.date}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {selItem&&<SaleModal itemData={selItem} data={data} updateItem={updateItem} fmt={fmt} onClose={()=>setSelItem(null)}/>}
    </div>
  );
}

// ── Sale from Stock Modal ─────────────────────────────────────────────────────
function SaleModal({itemData,data,updateItem,fmt,onClose}) {
  const {item,orderId,orderName}=itemData;
  const [sf,setSf]=useState({qty:"1",price:"",type:"cash",customer:"",date:today(),notes:""});

  const freshItem=data.orders.find(o=>o.id===orderId)?.items?.find(i=>i.id===item.id)||item;
  const salesLog=freshItem.salesLog||[];
  const total=Number(sf.qty||0)*Number(sf.price||0);
  const profit=total-Number(freshItem.unitCost||0)*Number(sf.qty||0);
  const rev=salesLog.reduce((s,sl)=>s+Number(sl.total||0),0);
  const col=salesLog.filter(sl=>sl.collected!==false).reduce((s,sl)=>s+Number(sl.total||0),0);

  const addSale=()=>{
    if(!sf.price||!sf.qty)return;
    const qty=Number(sf.qty);
    if(qty>freshItem.remaining){alert("الكمية أكبر من المتبقي!");return;}
    const newLog={id:uid(),qty,price:Number(sf.price),total,type:sf.type,customer:sf.customer,date:sf.date,notes:sf.notes,collected:sf.type!=="credit"};
    const upd=(data.orders.find(o=>o.id===orderId)?.items||[]).map(it=>it.id===item.id?{...it,remaining:it.remaining-qty,salesLog:[...(it.salesLog||[]),newLog]}:it);
    updateItem("orders",orderId,{items:upd});
    setSf({qty:"1",price:"",type:"cash",customer:"",date:today(),notes:""});
  };

  const toggleCol=id=>{
    const upd=(data.orders.find(o=>o.id===orderId)?.items||[]).map(it=>{
      if(it.id!==item.id)return it;
      return {...it,salesLog:(it.salesLog||[]).map(sl=>sl.id===id?{...sl,collected:!sl.collected}:sl)};
    });
    updateItem("orders",orderId,{items:upd});
  };

  const delLog=id=>{
    const entry=(freshItem.salesLog||[]).find(sl=>sl.id===id);
    if(!entry)return;
    const upd=(data.orders.find(o=>o.id===orderId)?.items||[]).map(it=>{
      if(it.id!==item.id)return it;
      return {...it,remaining:it.remaining+entry.qty,salesLog:(it.salesLog||[]).filter(sl=>sl.id!==id)};
    });
    updateItem("orders",orderId,{items:upd});
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal-box wide" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div className="modal-title">{freshItem.itemName}</div>
            <div style={{color:"#64748b",fontSize:12}}>أوردر: {orderName}</div>
          </div>
          <button className="del-btn2" onClick={onClose}>✕ إغلاق</button>
        </div>

        <div className="stock-chips">
          {[
            {label:"الكمية الكلية",val:freshItem.qty,color:"#818cf8"},
            {label:"المتبقي",val:freshItem.remaining,color:freshItem.remaining===0?"#f87171":"#4ade80"},
            {label:"مباع",val:freshItem.qty-freshItem.remaining,color:"#60a5fa"},
            {label:"إيراد",val:fmt(rev)+" ج.م",color:"#34d399"},
            {label:"محصل",val:fmt(col)+" ج.م",color:"#4ade80"},
            {label:"آجل معلق",val:fmt(rev-col)+" ج.م",color:"#fbbf24"},
          ].map(s=>(
            <div key={s.label} className="chip">
              <div className="chip-val" style={{color:s.color}}>{s.val}</div>
              <div className="chip-lbl">{s.label}</div>
            </div>
          ))}
        </div>

        {freshItem.remaining>0&&(
          <div style={{background:"#0a0f1e",border:"1px dashed #334155",borderRadius:10,padding:14,marginBottom:18}}>
            <div style={{color:"#818cf8",fontWeight:700,marginBottom:11,fontSize:13}}>+ تسجيل بيعة جديدة</div>
            <div className="form-row">
              <Inp label="الكمية" type="number" value={sf.qty} onChange={v=>setSf({...sf,qty:v})}/>
              <Inp label="سعر البيع" type="number" value={sf.price} onChange={v=>setSf({...sf,price:v})}/>
              <div className="field-group">
                <label className="lbl">نوع البيع</label>
                <select className="sel" value={sf.type} onChange={e=>setSf({...sf,type:e.target.value})}>
                  <option value="cash">كاش</option>
                  <option value="wholesale">جملة</option>
                  <option value="credit">آجل</option>
                </select>
              </div>
              <Inp label="العميل" value={sf.customer} onChange={v=>setSf({...sf,customer:v})}/>
              <Inp label="التاريخ" type="date" value={sf.date} onChange={v=>setSf({...sf,date:v})}/>
              <Inp label="ملاحظات" value={sf.notes} onChange={v=>setSf({...sf,notes:v})}/>
            </div>
            {total>0&&<div style={{color:"#4ade80",fontWeight:700,fontSize:12,marginBottom:8}}>الإجمالي: {fmt(total)} ج.م | ربح: {fmt(profit)} ج.م</div>}
            <button className="btn" onClick={addSale}>تسجيل البيعة</button>
          </div>
        )}
        {freshItem.remaining===0&&<div style={{textAlign:"center",color:"#f87171",fontWeight:700,marginBottom:14,padding:10,background:"rgba(239,68,68,.08)",borderRadius:8}}>⚠ نفد المخزن من هذا الصنف</div>}

        <div style={{color:"#818cf8",fontWeight:700,marginBottom:9,fontSize:13}}>سجل المبيعات ({salesLog.length})</div>
        {salesLog.length===0&&<div className="empty">لا توجد مبيعات لهذا الصنف بعد</div>}
        {[...salesLog].reverse().map(sl=>(
          <div key={sl.id} style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:8,padding:11,marginBottom:7}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:7}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"#e2e8f0",fontWeight:700,fontSize:13}}>{sl.customer||"عميل غير مسمى"}</span>
                  <span style={{color:"#64748b",fontSize:11}}>{sl.date}</span>
                  <span className="badge" style={{background:sl.type==="cash"?"#1e3a5f":sl.type==="wholesale"?"#1a3a2f":"#3a1a0a"}}>{sl.type==="cash"?"كاش":sl.type==="wholesale"?"جملة":"آجل"}</span>
                </div>
                <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#94a3b8"}}>كمية: <b style={{color:"#e2e8f0"}}>{sl.qty}</b></span>
                  <span style={{fontSize:12,color:"#94a3b8"}}>سعر: <b style={{color:"#e2e8f0"}}>{fmt(sl.price)}</b></span>
                  <span style={{fontSize:12,color:"#94a3b8"}}>إجمالي: <b style={{color:"#4ade80"}}>{fmt(sl.total)} ج.م</b></span>
                  <span style={{fontSize:12,color:"#94a3b8"}}>ربح: <b style={{color:"#34d399"}}>{fmt(sl.total-sl.qty*freshItem.unitCost)} ج.م</b></span>
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {sl.type==="credit"&&<button className="badge" style={{background:sl.collected?"#166534":"#7c2d12"}} onClick={()=>toggleCol(sl.id)}>{sl.collected?"✓ محصل":"⏳ معلق"}</button>}
                <button className="del-btn2" onClick={()=>delLog(sl.id)}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Sales Tab ─────────────────────────────────────────────────────────────────
function Sales({data,addItem,removeItem,updateItem,fmt}) {
  const empty={itemKey:"",item:"",qty:"1",price:"",cost:"",date:today(),type:"cash",customer:"",notes:""};
  const [f,setF]=useState(empty);

  const stockItems=data.orders.flatMap(o=>(o.items||[]).filter(it=>it.remaining>0).map(it=>({
    key:`${o.id}__${it.id}`,itemName:it.itemName,unitCost:it.unitCost,remaining:it.remaining,orderId:o.id,orderName:o.name,
  })));

  const total=Number(f.qty||0)*Number(f.price||0);
  const profit=total-Number(f.cost||0)*Number(f.qty||0);

  const pickItem=key=>{
    if(!key){setF({...f,itemKey:"",item:"",cost:""});return;}
    const found=stockItems.find(s=>s.key===key);
    if(found)setF({...f,itemKey:key,item:found.itemName,cost:String(found.unitCost)});
  };

  const save=()=>{
    if(!f.item||!f.price)return;
    addItem("sales",{...f,total,collected:f.type!=="credit"});
    setF(empty);
  };

  return (
    <div>
      <div className="section-title">تسجيل المبيعات</div>
      <div className="form-card">
        <div className="form-card-title">بيعة جديدة</div>
        <div className="form-row">
          <div className="field-group" style={{flex:"2 1 240px"}}>
            <label className="lbl">اسم القطعة</label>
            <select className="sel" value={f.itemKey} onChange={e=>pickItem(e.target.value)}>
              <option value="">— اختر من المخزن —</option>
              {stockItems.length===0&&<option disabled>لا يوجد أصناف في المخزن</option>}
              {data.orders.filter(o=>(o.items||[]).some(it=>it.remaining>0)).map(o=>(
                <optgroup key={o.id} label={"أوردر: "+o.name}>
                  {(o.items||[]).filter(it=>it.remaining>0).map(it=>(
                    <option key={`${o.id}__${it.id}`} value={`${o.id}__${it.id}`}>
                      {it.itemName}  ·  متبقي: {it.remaining}  ·  تكلفة: {fmt(it.unitCost)} ج.م
                    </option>
                  ))}
                </optgroup>
              ))}
            </select>
            {!f.itemKey&&(
              <input className="inp" style={{marginTop:5,fontSize:12}} placeholder="أو اكتب اسم القطعة يدوياً..." value={f.item} onChange={e=>setF({...f,item:e.target.value})}/>
            )}
            {f.itemKey&&<div style={{fontSize:11,color:"#64748b",marginTop:3}}>تكلفة الوحدة: <b style={{color:"#818cf8"}}>{fmt(f.cost)} ج.م</b> — تلقائي</div>}
          </div>
          <Inp label="الكمية" type="number" value={f.qty} onChange={v=>setF({...f,qty:v})}/>
          <Inp label="سعر البيع (ج.م)" type="number" value={f.price} onChange={v=>setF({...f,price:v})}/>
          <div className="field-group">
            <label className="lbl">تكلفة الشراء (ج.م)</label>
            <input className="inp" style={f.itemKey?{borderColor:"#6366f1",background:"#1a1f3a"}:{}} type="number" value={f.cost} onChange={e=>setF({...f,cost:e.target.value})} placeholder="تلقائي من المخزن"/>
          </div>
        </div>
        <div className="form-row">
          <Inp label="التاريخ" type="date" value={f.date} onChange={v=>setF({...f,date:v})}/>
          <div className="field-group">
            <label className="lbl">نوع البيع</label>
            <select className="sel" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>
              <option value="cash">كاش</option>
              <option value="wholesale">جملة</option>
              <option value="credit">آجل</option>
            </select>
          </div>
          <Inp label="العميل" value={f.customer} onChange={v=>setF({...f,customer:v})}/>
          <Inp label="ملاحظات" value={f.notes} onChange={v=>setF({...f,notes:v})}/>
        </div>
        {total>0&&(
          <div className="sale-summary">
            <span style={{color:"#60a5fa",fontWeight:700}}>الإجمالي: {fmt(total)} ج.م</span>
            <span style={{color:"#4ade80",fontWeight:700}}>الربح: {fmt(profit)} ج.م</span>
          </div>
        )}
        <button className="btn" onClick={save}>تسجيل البيعة</button>
      </div>

      <div className="tbl-wrap">
        {data.sales.length===0?<div className="empty">لا توجد مبيعات مسجلة يدوياً</div>:(
          <table>
            <thead><tr>
              {["القطعة","الكمية","السعر","التكلفة","الإجمالي","النوع","العميل","التاريخ","الحالة",""].map(h=><th key={h}>{h}</th>)}
            </tr></thead>
            <tbody>
              {data.sales.map(s=>(
                <tr key={s.id}>
                  <td>{s.item}</td><td>{s.qty}</td><td>{fmt(s.price)}</td><td>{fmt(s.cost)}</td><td>{fmt(s.total)}</td>
                  <td>{s.type==="cash"?"كاش":s.type==="wholesale"?"جملة":"آجل"}</td>
                  <td>{s.customer}</td><td>{s.date}</td>
                  <td>{s.type==="credit"?<button className="badge" style={{background:s.collected?"#166534":"#7c2d12"}} onClick={()=>updateItem("sales",s.id,{collected:!s.collected})}>{s.collected?"✓ محصل":"⏳ معلق"}</button>:<span className="badge" style={{background:"#1e3a5f"}}>مكتمل</span>}</td>
                  <td><button className="del-btn2" onClick={()=>removeItem("sales",s.id)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ── Expenses ──────────────────────────────────────────────────────────────────
function Expenses({data,addItem,removeItem,fmt}) {
  const [f,setF]=useState({description:"",amount:"",category:"مرتبات",date:today(),notes:""});
  const cats=["مرتبات","بنزين","شحن","إيجار","خسارة","متنوعات","أخري"];
  return (
    <div>
      <div className="section-title">المصاريف والنثريات</div>
      <div className="form-card">
        <div className="form-card-title">تسجيل مصروف</div>
        <div className="form-row">
          <Inp label="البيان" value={f.description} onChange={v=>setF({...f,description:v})}/>
          <Inp label="المبلغ (ج.م)" type="number" value={f.amount} onChange={v=>setF({...f,amount:v})}/>
          <div className="field-group">
            <label className="lbl">التصنيف</label>
            <select className="sel" value={f.category} onChange={e=>setF({...f,category:e.target.value})}>
              {cats.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <Inp label="التاريخ" type="date" value={f.date} onChange={v=>setF({...f,date:v})}/>
        </div>
        <Inp label="ملاحظات" value={f.notes} onChange={v=>setF({...f,notes:v})}/>
        <button className="btn" style={{marginTop:8}} onClick={()=>{if(!f.description||!f.amount)return;addItem("expenses",f);setF({description:"",amount:"",category:"مرتبات",date:today(),notes:""});}}>حفظ المصروف</button>
      </div>
      <div className="grid4" style={{marginBottom:18}}>
        {cats.map(cat=>{
          const t=data.expenses.filter(e=>e.category===cat).reduce((s,e)=>s+Number(e.amount||0),0);
          if(!t)return null;
          return <div key={cat} className="card" style={{borderTop:"3px solid #fb923c"}}><div style={{color:"#fb923c",fontWeight:700,fontSize:15}}>{fmt(t)} ج.م</div><div className="card-label">{cat}</div></div>;
        })}
      </div>
      <div className="tbl-wrap">
        {data.expenses.length===0?<div className="empty">لا توجد مصاريف</div>:(
          <table>
            <thead><tr>{["البيان","المبلغ","التصنيف","التاريخ","ملاحظات",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>{data.expenses.map(e=>(
              <tr key={e.id}><td>{e.description}</td><td>{fmt(e.amount)} ج.م</td><td>{e.category}</td><td>{e.date}</td><td>{e.notes}</td><td><button className="del-btn2" onClick={()=>removeItem("expenses",e.id)}>✕</button></td></tr>
            ))}</tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ── Daily ─────────────────────────────────────────────────────────────────────
function Daily({data,addItem,removeItem}) {
  const [f,setF]=useState({date:today(),content:"",type:"ملاحظة"});
  const types=["ملاحظة","اتصال","موعد","مهمة","تذكير"];
  return (
    <div>
      <div className="section-title">اليوميات والملاحظات</div>
      <div className="form-card">
        <div className="form-card-title">إضافة قيد يومي</div>
        <div className="form-row">
          <Inp label="التاريخ" type="date" value={f.date} onChange={v=>setF({...f,date:v})}/>
          <div className="field-group">
            <label className="lbl">النوع</label>
            <select className="sel" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>
              {types.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div className="field-group" style={{marginBottom:8}}>
          <label className="lbl">المحتوى</label>
          <textarea className="ta" value={f.content} onChange={e=>setF({...f,content:e.target.value})} placeholder="اكتب الملاحظة هنا..."/>
        </div>
        <button className="btn" onClick={()=>{if(!f.content)return;addItem("dailyNotes",f);setF({date:today(),content:"",type:"ملاحظة"});}}>حفظ القيد</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[...data.dailyNotes].reverse().map(note=>(
          <div key={note.id} className="card" style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{minWidth:55,textAlign:"center"}}>
              <div style={{color:"#818cf8",fontWeight:700,fontSize:12}}>{note.date}</div>
              <span className="badge" style={{background:"#1e293b",marginTop:3,display:"inline-block"}}>{note.type}</span>
            </div>
            <div style={{flex:1,color:"#e2e8f0",lineHeight:1.6,fontSize:13}}>{note.content}</div>
            <button className="del-btn2" onClick={()=>removeItem("dailyNotes",note.id)}>✕</button>
          </div>
        ))}
        {data.dailyNotes.length===0&&<div className="empty">لا توجد قيود يومية</div>}
      </div>
    </div>
  );
}

// ── Reports ───────────────────────────────────────────────────────────────────
function Reports({data,fmt,partnerShares,totals,creditSales=[]}) {
  const {totalSalesRevenue,totalSalesCost,grossProfit,netProfit,totalExpenses,totalWithdrawals,pendingCredit,availableProfit}=totals;
  const catExp={};
  data.expenses.forEach(e=>{catExp[e.category]=(catExp[e.category]||0)+Number(e.amount||0);});

  return (
    <div>
      <div className="section-title">التقارير المالية</div>
      <div className="form-card">
        <div className="form-card-title">قائمة الأرباح والخسائر</div>
        <PLR label="إجمالي المبيعات" val={fmt(totalSalesRevenue)} color="#60a5fa"/>
        <PLR label="تكلفة البضاعة المباعة" val={"("+fmt(totalSalesCost)+")"} color="#f87171"/>
        <PLR label="مجمل الربح" val={fmt(grossProfit)} color="#34d399" bold/>
        <div style={{borderTop:"1px dashed #334155",margin:"10px 0"}}/>
        {Object.entries(catExp).map(([cat,amt])=><PLR key={cat} label={cat} val={"("+fmt(amt)+")"} color="#fb923c"/>)}
        <PLR label="إجمالي المصاريف" val={"("+fmt(totalExpenses)+")"} color="#f87171" bold/>
        <div style={{borderTop:"1px dashed #334155",margin:"10px 0"}}/>
        <PLR label="صافي الربح" val={fmt(netProfit)} color={netProfit>=0?"#4ade80":"#f87171"} bold large/>
        <PLR label="السحوبات" val={"("+fmt(totalWithdrawals)+")"} color="#f472b6"/>
        <PLR label="آجل غير محصل" val={"("+fmt(pendingCredit)+")"} color="#fbbf24"/>
        <PLR label="الربح المتاح للتوزيع" val={fmt(availableProfit)} color="#a78bfa" bold large/>
      </div>

      {partnerShares.length>0&&(
        <div className="form-card">
          <div className="form-card-title">توزيع الأرباح على الشركاء</div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>{["الشريك","رأس المال","إضافات","الإجمالي","النسبة","نصيب الربح","سحوبات","الصافي"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{partnerShares.map(p=>(
                <tr key={p.id}>
                  <td style={{fontWeight:700}}>{p.name}</td>
                  <td>{fmt(p.capital)}</td>
                  <td>{fmt(p.totalContrib-p.capital)}</td>
                  <td style={{color:"#818cf8",fontWeight:700}}>{fmt(p.totalContrib)}</td>
                  <td>{p.share.toFixed(2)}%</td>
                  <td style={{color:"#4ade80",fontWeight:700}}>{fmt(p.profitShare)}</td>
                  <td style={{color:"#f87171"}}>{fmt(p.partnerWithdrawals)}</td>
                  <td style={{color:"#a78bfa",fontWeight:700}}>{fmt(p.profitShare-p.partnerWithdrawals)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {creditSales.filter(s=>s.type==="credit").length>0&&(
        <div className="form-card">
          <div className="form-card-title">مبيعات الآجل</div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>{["العميل","الصنف","الإجمالي","التاريخ","الحالة"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{creditSales.filter(s=>s.type==="credit").map((s,i)=>(
                <tr key={i}>
                  <td>{s.customer}</td>
                  <td>{s.item||s.itemName||"—"}</td>
                  <td>{fmt(s.total)} ج.م</td>
                  <td>{s.date}</td>
                  <td><span className="badge" style={{background:s.collected?"#166534":"#7c2d12"}}>{s.collected?"محصل":"معلق"}</span></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Partner Modal ─────────────────────────────────────────────────────────────
function PartnerModal({modal,setModal,addItem}) {
  const [f,setF]=useState({amount:"",date:today(),notes:""});
  const isD=modal.type==="deposit";
  const save=()=>{
    if(!f.amount)return;
    addItem(isD?"partnerDeposits":"withdrawals",{...f,partnerId:modal.partnerId});
    setModal(null);
  };
  return (
    <div className="overlay" onClick={()=>setModal(null)}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{isD?"إضافة أموال":"سحب من الأرباح"} — {modal.partnerName}</div>
        <Inp label="المبلغ (ج.م)" type="number" value={f.amount} onChange={v=>setF({...f,amount:v})}/>
        <Inp label="التاريخ" type="date" value={f.date} onChange={v=>setF({...f,date:v})}/>
        <Inp label="ملاحظات" value={f.notes} onChange={v=>setF({...f,notes:v})}/>
        <div style={{display:"flex",gap:9,marginTop:14}}>
          <button className="btn" onClick={save}>{isD?"إضافة":"سحب"}</button>
          <button className="btn danger" onClick={()=>setModal(null)}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

// ── Shared helpers ────────────────────────────────────────────────────────────
function Inp({label,value,onChange,type="text"}) {
  return (
    <div className="field-group">
      <label className="lbl">{label}</label>
      <input className="inp" type={type} value={value} onChange={e=>onChange(e.target.value)}/>
    </div>
  );
}
function DRow({label,val,accent,green,red}) {
  return (
    <div className="row-data">
      <span className="lv">{label}</span>
      <span className={`rv${green?" green":red?" red":accent?" accent":""}`}>{val}</span>
    </div>
  );
}
function PLR({label,val,color,bold,large}) {
  return (
    <div className={`pl-row${bold?" bold":""}${large?" large":""}`}>
      <span className="pl-lbl">{label}</span>
      <span className="pl-val" style={{color,fontWeight:bold?700:600}}>{val} ج.م</span>
    </div>
  );
}

// ── Render ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App/>);
</script>

<!-- PWA Service Worker registration -->

<script>
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'autoparts-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(()=>self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }).catch(()=>caches.match(e.request))));
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
